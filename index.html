<!DOCTYPE html>
<html>
<head>
  <title>Infrdomain Verification</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      color: lightgreen;
    }
  </style>
</head>

<body>

  <h1>Roblox Verification</h1>

  <p>Enter your Roblox username:</p>

  <input id="rbxName" placeholder="Roblox username">

  <br>

  <button onclick="verify()">Verify Account</button>

  <p id="status"></p>

<script type="module">

// Firebase CDN (you will paste your config here)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// fake verification for now (we replace with Roblox OAuth next)
window.verify = async function () {
  const name = document.getElementById("rbxName").value;

  if (!name) return;

  // store as "verified user"
  await setDoc(doc(db, "users", name), {
    robloxName: name,
    verified: true,
    time: Date.now()
  });

  document.getElementById("status").innerText =
    "Verified (temporary system ready for OAuth upgrade)";
};

</script>

</body>
</html>
