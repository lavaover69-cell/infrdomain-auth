<!DOCTYPE html>
<html>
<head>
  <title>Infrdomain Verification</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f1a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #4c7dff;
      color: white;
    }

    button:hover {
      background: #2f5fff;
    }

    #status {
      margin-top: 20px;
      color: lightgreen;
    }
  </style>
</head>

<body>

  <h1>Roblox Account Verification</h1>

  <p>Connect your Roblox account to unlock trading</p>

  <button onclick="connectRoblox()">Connect Roblox</button>

  <p id="status"></p>

<script>
async function connectRoblox() {
  try {
    document.getElementById("status").innerText = "Redirecting to Roblox...";

    // Call your Vercel backend
    const res = await fetch("/api/start-roblox-login");

    const data = await res.json();

    if (data.redirect) {
      window.location.href = data.redirect;
    } else {
      document.getElementById("status").innerText = "Failed to start login.";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error connecting to server.";
  }
}
</script>

</body>
</html>
